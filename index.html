        function render(filter = "") {
            mount.innerHTML = '';
            const normalize = (str) => str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const query = normalize(filter);
            
            const filtered = artData.filter(a => 
                normalize(a.n).includes(query) || normalize(a.e).includes(query)
            );

            let lastEra = "";
            filtered.forEach((art) => {
                if(art.e !== lastEra) {
                    const h = document.createElement('div'); 
                    h.className = 'era-header';
                    h.innerText = art.e;
                    h.onmouseenter = () => {
                        let yearNum = Math.abs(parseInt(art.y.replace(/[^0-9]/g, '')));
                        let data = eraInfo[art.e];
                        let desc = Array.isArray(data) ? (data.find(v => yearNum >= v.hasta) || data[data.length-1]).desc : (data || "Archivo...");
                        document.getElementById('era-title').innerText = art.e;
                        document.getElementById('era-desc').innerText = desc;
                        eraTooltip.classList.add('visible');
                    };
                    h.onmouseleave = () => eraTooltip.classList.remove('visible');
                    mount.appendChild(h); 
                    lastEra = art.e;
                }
                const row = document.createElement('div');
                row.className = 'timeline-row';
                row.dataset.globalIndex = artData.indexOf(art);
                row.innerHTML = `<div class="axis-cell"><span class="axis-year">${art.y}</span></div>
                                 <div class="item-cell"><span class="item-name">${art.n}</span></div>`;
                row.onclick = () => { targetY = row.offsetTop - window.innerHeight/2 + 42; };
                mount.appendChild(row);
            });
        }

        function animate() {
            currentY += (targetY - currentY) * 0.12;
            mount.style.transform = `translateY(${-currentY}px)`;
            const rows = document.querySelectorAll('.timeline-row');
            let closest = null; let minDist = Infinity;
            rows.forEach(row => {
                const d = Math.abs(window.innerHeight/2 - (row.getBoundingClientRect().top + 42));
                if (d < minDist) { minDist = d; closest = row; }
            });
            if (closest && !closest.classList.contains('active')) {
                rows.forEach(r => r.classList.remove('active'));
                closest.classList.add('active');
                updateDisplay(closest.dataset.globalIndex);
                prog.style.width = ((closest.dataset.globalIndex / (artData.length-1)) * 100) + "%";
            }
            requestAnimationFrame(animate);

const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbClose = document.getElementById('lightbox-close');
const mainBg = document.getElementById('main-bg');

// Abrir al hacer click en el fondo
mainBg.addEventListener('click', () => {
    // Extraemos la URL limpia del background-image
    const currentBg = mainBg.style.backgroundImage;
    const url = currentBg.slice(5, -2); // Limpia el formato url("...")
    
    if (url && url !== "") {
        lbImg.src = url;
        lb.classList.add('active');
    }

const audioBtn = document.getElementById('audio-control');
        const bgm = document.getElementById('ambient-bgm');
        let isPlaying = false;

        bgm.volume = 0.3; // Volumen bajo para que sea ambiente

        audioBtn.addEventListener('click', () => {
            if (!isPlaying) {
                bgm.play();
                audioBtn.classList.add('playing');
                audioBtn.querySelector('#audio-icon').innerText = '◆';
            } else {
                bgm.pause();
                audioBtn.classList.remove('playing');
                audioBtn.querySelector('#audio-icon').innerText = '◈';
            }
            isPlaying = !isPlaying;
        });

        // Opcional: Iniciar al primer click en cualquier parte de la web
        document.addEventListener('click', () => {
            if(!isPlaying && bgm.paused) {
                // Descomenta la siguiente línea si quieres que empiece solo
                // audioBtn.click(); 
            }
        }, { once: true });
});

// Función para cerrar
const closeLightbox = () => {
    lb.classList.remove('active');
};

// Cerrar al hacer click en la cruz o en el fondo del lightbox
lbClose.addEventListener('click', closeLightbox);
lb.addEventListener('click', (e) => {
    if (e.target !== lbImg) closeLightbox();
});

const audioBtn = document.getElementById('audio-control');
const bgm = document.getElementById('ambient-bgm');
let isPlaying = false;

audioBtn.addEventListener('click', () => {
    if (!isPlaying) {
        bgm.volume = 0;
        bgm.play();
        
        // Subida de volumen progresiva
        let fadeIn = setInterval(() => {
            if (bgm.volume < 0.2) {
                bgm.volume += 0.01;
            } else {
                clearInterval(fadeIn);
            }
        }, 50);

        audioBtn.classList.add('playing');
        audioBtn.querySelector('#audio-icon').innerText = '◆';
    } else {
        // Bajada de volumen progresiva
        let fadeOut = setInterval(() => {
            if (bgm.volume > 0.01) {
                bgm.volume -= 0.01;
            } else {
                bgm.pause();
                clearInterval(fadeOut);
            }
        }, 30);
        
        audioBtn.classList.remove('playing');
        audioBtn.querySelector('#audio-icon').innerText = '◈';
    }
    isPlaying = !isPlaying;
});

searchTrigger.addEventListener('click', (e) => {

// Cerrar buscador si pulsas fuera
document.addEventListener('click', (e) => {
    if (!searchContainer.contains(e.target) && searchContainer.classList.contains('open')) {
        searchContainer.classList.remove('open');

});

// Lógica de la Lupa
const btnLupa = document.getElementById('mobile-search-trigger');
const menuBusqueda = document.getElementById('search-container');
const infoBox = document.getElementById('display-text');
const timeline = document.getElementById('master-container');

btnLupa.addEventListener('click', (e) => {
    menuBusqueda.classList.toggle('search-open');
    e.stopPropagation();
});

// Cerrar todo al tocar el timeline (el fondo)
timeline.addEventListener('click', () => {
    menuBusqueda.classList.remove('search-open');
    infoBox.classList.remove('active');
    timeline.classList.remove('blur-container');
});

// Detectar cuando cambia el texto para mostrar el Modal y desenfocar
const observador = new MutationObserver(() => {
    if (window.innerWidth <= 768 && infoBox.innerText.trim() !== "") {
        infoBox.classList.add('active');
        timeline.classList.add('blur-container');
    }
});
observador.observe(infoBox, { childList: true, characterData: true, subtree: true });
